<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CDGDG - AI Agent Product Engineer</title>
  <desc id="desc">A portfolio banner with connected agent nodes and product engineering labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="80" x2="1140" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
